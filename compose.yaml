version: "3.9"

services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "1000:80"
    restart: unless-stopped
    networks:
      - application

  postgres:
    build: ./Database
    container_name: dev_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - ./Database/Files:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - application

networks:
  application:
    driver: bridge